[build]
  command = "npm run build"
  publish = ".next"

# Configuración de Node.js
[build.environment]
  NODE_VERSION = "20"
  # Omitir vars cuyo valor puede aparecer en archivos de repo o bundles por diseño
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,GEMINI_API_KEY,DOBLEVELA_API_KEY,DOBLEVELA_SERVICE_URL,DOBLEVELA_API_TIMEOUT,INNOVATION_AUTH_TOKEN,INNOVATION_USER,INNOVATION_CLAVE,INNOVATION_API_TIMEOUT,PROMOOPCION_USER,PROMOOPCION_API_KEY,PROMOOPCION_DEMO,PROMOOPCION_BASE_URL,PROMOOPCION_API_TIMEOUT"
  # Omitir: binarios de caché webpack, archivo de ejemplo y plugins de terceros
  SECRETS_SCAN_OMIT_PATHS = ".next/cache,env.example,.netlify/plugins"

# IMPORTANTE: Configurar las siguientes variables de entorno en:
# Netlify Dashboard > Site settings > Environment variables
#
# Variables MÍNIMAS requeridas para que el sitio funcione:
# - NEXT_PUBLIC_SUPABASE_URL
# - NEXT_PUBLIC_SUPABASE_ANON_KEY
# - NEXTAUTH_URL (ejemplo: https://tu-sitio.netlify.app)
# - NEXTAUTH_SECRET (genera uno con: openssl rand -base64 32)
#
# Para ver todas las variables opcionales, consulta .env.example
